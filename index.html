<!DOCTYPE html>
<html lang="Pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,800;1,800&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="Faviconlogin.png" type="image/x-icon">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'> 
    <link rel="stylesheet" href="stylelogin.css">
</head>
<body>
    <main class="Janelaprincipal">
        <form>
            <h1>Login Plataform</h1>
            <div class="Usuariosenha">
                <input type="email" placeholder="Usuario">
                <i class="bx bxs-user"></i>
            </div>
            <div class="Usuariosenha">
                <input type="password" placeholder="Senha">
                <i class="bx bxs-lock-alt"></i>
            </div>
            <div class="Lembrar">
                <label>
                    <input type="checkbox">
                    Lembrar Senha
                </label>
                <a href="#">Esqueceu a senha?</a>
            </div>
            <div class="registrar">   
                <button id="botão login">Login</button>
                <label for="">
                    Não tem conta ?
                    <a href="#">Registrar</a>
                </label>
            </div>
        </form>
    </main>
</body>
</html>
